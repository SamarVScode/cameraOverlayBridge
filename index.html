<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VerifyScan Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        :root{
            --void:#030508;
            --surface-0:#080c14;
            --surface-1:#0d1424;
            --surface-2:#111a2e;
            --surface-3:#16213e;
            --rim:#ffffff0f;
            --rim-bright:#ffffff1a;
            --neon-cyan:#00e5ff;
            --neon-violet:#9d4edd;
            --neon-rose:#ff3860;
            --text-0:#f0f4ff;
            --text-1:#9aaccc;
            --text-2:#4e627e;
            --font-display:'Outfit',sans-serif;
            --font-mono:'JetBrains Mono',monospace;
            --r-lg:16px;
            --r-xl:22px;
            --mesh-1:rgba(157,78,221,0.15);
            --mesh-2:rgba(0,229,255,0.15);
        }

        [data-theme="light"] {
            --void:#f8faff;
            --surface-0:#ffffff;
            --surface-1:#f1f5f9;
            --surface-2:#e2e8f0;
            --surface-3:#cbd5e1;
            --rim:rgba(15,23,42,0.06);
            --rim-bright:rgba(15,23,42,0.1);
            --text-0:#0f172a;
            --text-1:#334155;
            --text-2:#64748b;
            --neon-cyan:#0ea5e9;
            --neon-violet:#8b5cf6;
            --neon-rose:#ef4444;
            --mesh-1:rgba(139,92,246,0.18);
            --mesh-2:rgba(14,165,233,0.18);
        }

        *{box-sizing:border-box;margin:0;padding:0}
        body{
            background: 
                radial-gradient(at 0% 0%, var(--mesh-1) 0px, transparent 50%),
                radial-gradient(at 100% 0%, var(--mesh-2) 0px, transparent 50%),
                var(--void);
            background-attachment: fixed;
            color: var(--text-0);
            font-family: var(--font-display);
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #app-frame {
            width: 100%;
            height: 100vh;
            border: none;
            display: block;
            z-index: 1;
        }

        .aurora{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
        .aurora-orb{
            position:absolute;border-radius:50%;filter:blur(120px);opacity:0.15;
            animation:drift 20s ease-in-out infinite alternate;
        }
        .orb-1{width:700px;height:700px;background:var(--neon-violet);top:-200px;left:-150px;animation-duration:22s}
        .orb-2{width:500px;height:500px;background:var(--neon-cyan);bottom:-100px;right:-100px;animation-duration:18s}
        @keyframes drift{
            0%{transform:translate(0,0) scale(1)}
            100%{transform:translate(30px,20px) scale(1.02)}
        }

        #camera-bridge-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(3,5,8,0.85);
            backdrop-filter: blur(20px);
            z-index: 999999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            padding: 20px;
        }
        #camera-bridge-overlay.active { display: flex; }

        .video-container {
            width: 100%;
            max-width: 560px;
            position: relative;
            background: #000;
            border-radius: var(--r-xl);
            border: 1px solid var(--rim-bright);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        #bridge-video {
            width: 100%;
            display: block;
            transform: scaleX(1); /* Set to -1 if you want mirrored, but environment usually isn't */
        }

        .bridge-controls {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 10px;
            padding: 14px 36px;
            border: none;
            border-radius: var(--r-lg);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: var(--font-display);
        }
        .btn:active { transform: scale(0.96); }

        #btn-bridge-snap {
            background: linear-gradient(135deg, var(--neon-violet), var(--neon-cyan));
            color: #050810;
            box-shadow: 0 0 30px rgba(0,229,255,0.2);
        }
        #btn-bridge-snap:hover { transform: translateY(-2px); box-shadow: 0 5px 30px rgba(0,229,255,0.4); }

        #btn-bridge-cancel {
            background: var(--surface-2);
            color: var(--text-1);
            border: 1px solid var(--rim-bright);
        }
        #btn-bridge-cancel:hover { background: var(--surface-3); color: var(--text-0); }

        .bridge-label {
            color: var(--neon-cyan);
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            background: rgba(0,229,255,0.1);
            padding: 6px 16px;
            border-radius: 99px;
            border: 1px solid rgba(0,229,255,0.2);
        }

        #bridge-error {
            color: var(--neon-rose);
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            padding: 12px 24px;
            background: rgba(255,56,96,0.1);
            border-radius: var(--r-md);
            border: 1px solid rgba(255,56,96,0.2);
            max-width: 400px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="aurora">
        <div class="aurora-orb orb-1"></div>
        <div class="aurora-orb orb-2"></div>
    </div>

    <!-- GAS Web App Frame -->
    <iframe id="app-frame" src="https://script.google.com/a/macros/myntra.com/s/AKfycbz3rrGOCANMEc7jczWZVchQMHDNRRrs0DXmhqiJoBMDhUFds9woUAHM435lIvACLL8HHA/exec" allow="camera; microphone" allowfullscreen></iframe>

    <!-- Camera Bridge Overlay -->
    <div id="camera-bridge-overlay">
        <div class="bridge-label">VerifyScan Capture</div>
        <div class="video-container">
            <video id="bridge-video" autoplay playsinline muted></video>
        </div>
        <div id="bridge-error"></div>
        <div class="bridge-controls">
            <button id="btn-bridge-snap" class="btn"><i class="bi bi-camera-fill"></i> Capture</button>
            <button id="btn-bridge-cancel" class="btn"><i class="bi bi-x-lg"></i> Cancel</button>
        </div>
    </div>

    <script>
        // --- THEME SYNC ---
        function syncTheme() {
            var theme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
        }
        window.addEventListener('storage', syncTheme);
        syncTheme();

        var overlay = document.getElementById('camera-bridge-overlay');
        var video = document.getElementById('bridge-video');
        var btnSnap = document.getElementById('btn-bridge-snap');
        var btnCancel = document.getElementById('btn-bridge-cancel');
        var errorBox = document.getElementById('bridge-error');
        var gasFrame = document.getElementById('app-frame');

        var activeStream = null;
        var activeTarget = null;
        var gasWindow = null; // Reference back to the iframe's contentWindow

        // ── Listen for messages from the GAS iframe ──────────
        window.addEventListener('message', function (event) {
            var data = event.data;
            if (!data || typeof data.type !== 'string') return;

            if (data.type === 'OPEN_CAMERA') {
                activeTarget = data.target || null;
                gasWindow = event.source; // Save reference for reply
                openCameraBridge();
            }

            if (data.type === 'CLOSE_CAMERA') {
                closeCameraBridge();
            }
        });

        // ── Open the camera overlay ───────────────────────────
        function openCameraBridge() {
            errorBox.style.display = 'none';
            overlay.classList.add('active');

            navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 1280 } }
            }).then(function (stream) {
                activeStream = stream;
                video.srcObject = stream;
            }).catch(function (err) {
                var msg = err.name === 'NotAllowedError'
                    ? 'Camera access denied. Please allow camera permission and try again.'
                    : 'Could not open camera: ' + err.message;
                showError(msg);
            });
        }

        // ── Capture photo ─────────────────────────────────────
        btnSnap.addEventListener('click', function () {
            if (!activeStream) return;

            var canvas = document.createElement('canvas');
            var maxDim = 1280;
            var w = video.videoWidth;
            var h = video.videoHeight;

            // Downscale if needed
            if (w > h) {
                if (w > maxDim) { h = Math.round(h * maxDim / w); w = maxDim; }
            } else {
                if (h > maxDim) { w = Math.round(w * maxDim / h); h = maxDim; }
            }

            canvas.width = w;
            canvas.height = h;
            canvas.getContext('2d').drawImage(video, 0, 0, w, h);
            var dataUrl = canvas.toDataURL('image/jpeg', 0.8);

            // Send image back to GAS iframe
            var targetWindow = gasWindow || gasFrame.contentWindow;
            targetWindow.postMessage({
                type: 'CAMERA_RESULT',
                image: dataUrl,
                target: activeTarget
            }, '*');

            closeCameraBridge();
        });

        // ── Cancel button ─────────────────────────────────────
        btnCancel.addEventListener('click', function () {
            // Notify GAS iframe to cancel its waiting state
            var targetWindow = gasWindow || gasFrame.contentWindow;
            if (targetWindow) {
                targetWindow.postMessage({ type: 'CLOSE_CAMERA' }, '*');
            }
            closeCameraBridge();
        });

        // ── Close / cleanup ───────────────────────────────────
        function closeCameraBridge() {
            if (activeStream) {
                activeStream.getTracks().forEach(function (t) { t.stop(); });
                activeStream = null;
            }
            video.srcObject = null;
            overlay.classList.remove('active');
            activeTarget = null;
            gasWindow = null;
        }

        // ── Show error inside overlay ─────────────────────────
        function showError(msg) {
            errorBox.textContent = msg;
            errorBox.style.display = 'block';
        }
    </script>

</body>


</html>
